<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d1a17">
  <title>Real Alto WebAR</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="./museumMap.js" defer></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <section class="intro-screen" id="intro-screen" aria-label="Pantalla introductoria">
    <div class="intro-card">
      <p class="eyebrow">Museo Real Alto</p>
      <h1>Explora la experiencia WebAR</h1>
      <p class="intro-copy">Activa la experiencia y apunta a la marca para ver las figuras sobre la camara, sin paneles encima.</p>
      <button id="enter-experience" class="button button-strong intro-button" type="button">Iniciar experiencia</button>
    </div>
  </section>

  <section class="viewer-shell" aria-label="Escena de realidad aumentada">
    <a-scene
      id="ar-scene"
      mindar-image="imageTargetSrc: ./assets/targets/realalto-target.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no"
      vr-mode-ui="enabled: false"
      renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="calibration-ring" src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Alfa_omega.svg/512px-Alfa_omega.svg.png" alt="calibration ring">
      </a-assets>

      <a-camera id="ar-camera" position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="origin-target" mindar-image-target="targetIndex: 0">
        <a-plane position="0 0 0" rotation="-90 0 0" width="0.8" height="0.8" material="src: #calibration-ring; transparent: true; opacity: 0.9"></a-plane>
        <a-ring position="0 0.01 0" rotation="-90 0 0" radius-inner="0.12" radius-outer="0.18" material="color: #d8a25e; opacity: 0.85"></a-ring>
      </a-entity>

      <a-entity id="world-root" gestor-navegacion></a-entity>
    </a-scene>
  </section>
</body>
</html>
